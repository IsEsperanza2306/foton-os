[build]
  publish = "public"

# Prevent browser/CDN caching of HTML and JS so users always get fresh content
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Clean URL redirects (serves .html without extension in URL)
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/bp-tracker"
  to = "/bp-tracker.html"
  status = 200

[[redirects]]
  from = "/field-app"
  to = "/field-app.html"
  status = 200

[[redirects]]
  from = "/direccion"
  to = "/direccion.html"
  status = 200

[[redirects]]
  from = "/mapa"
  to = "/mapa.html"
  status = 200

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
