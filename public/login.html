<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0C447C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Foton OS">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/pwa-192.png">
  <title>Acceso — Foton OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0C447C;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(24,95,165,0.4) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(4,44,83,0.6) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 32px 80px rgba(4,44,83,0.4), 0 8px 24px rgba(0,0,0,0.12);
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .brand-pill {
      background: #EEF5FD;
      border: 1.5px solid #B5D4F4;
      border-radius: 10px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .brand-word {
      font-family: 'Inter Tight', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #0C447C;
      letter-spacing: 2px;
    }

    .brand-sep {
      width: 1px;
      height: 18px;
      background: #B5D4F4;
    }

    .brand-os {
      font-family: 'Inter Tight', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #185FA5;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .brand-title {
      font-family: 'Inter Tight', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #1A1A2E;
      text-align: center;
    }

    .brand-sub {
      font-size: 13px;
      color: #6B6B80;
      text-align: center;
      margin-top: 4px;
    }

    /* Google OAuth button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      background: #fff;
      border: 1.5px solid #E0E0EC;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #1A1A2E;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 20px;
    }
    .btn-google:hover:not(:disabled) {
      border-color: #185FA5;
      background: #F7F9FF;
      box-shadow: 0 2px 8px rgba(24,95,165,0.12);
    }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #F0F0F5;
    }
    .divider span {
      font-size: 11px;
      font-weight: 600;
      color: #C4C4D0;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #6B6B80;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #E0E0EC;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #1A1A2E;
      outline: none;
      transition: border-color .2s;
      background: #FAFAFA;
    }
    .field input:focus {
      border-color: #185FA5;
      background: #fff;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      margin-top: 4px;
    }
    .btn-primary:hover:not(:disabled) { background: #0C447C; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .msg.error { background: #FDECEA; color: #C0392B; border: 1px solid #F5C6C2; }
    .msg.success { background: #E6F5EE; color: #1A8C5B; border: 1px solid #A3D9B9; }

    .toggle-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #6B6B80;
    }
    .toggle-link button {
      background: none;
      border: none;
      color: #185FA5;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    .magic-note {
      margin-top: 12px;
      font-size: 11px;
      color: #6B6B80;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div style="display:flex;justify-content:center;margin-bottom:20px">
      <div style="background:#0C447C;border-radius:20px;padding:14px;box-shadow:0 8px 32px rgba(4,44,83,0.35);display:flex;align-items:center;justify-content:center;">
        <img src="./foton-icon-trans.png" alt="Foton" style="height:100px;width:100px;object-fit:contain;">
      </div>
    </div>
    <div class="brand-title">GR Centro-Sur</div>
    <div class="brand-sub">Plataforma de gestión de red</div>
  </div>

  <!-- Google OAuth -->
  <button class="btn-google" id="btn-google" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18">
      <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
      <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
      <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18z"/>
      <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.31z"/>
    </svg>
    Continuar con Google
  </button>

  <div class="divider"><span>o con correo corporativo</span></div>

  <!-- Email/Password form -->
  <div id="form-password">
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="inp-email" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="inp-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btn-login" onclick="loginPassword()">Ingresar</button>
    <span class="toggle-link">
      ¿Sin contraseña?
      <button onclick="showMagicLink()">Acceder con link al correo</button>
    </span>
  </div>

  <!-- Magic link form -->
  <div id="form-magic" style="display:none">
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="inp-magic-email" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <button class="btn-primary" id="btn-magic" onclick="loginMagic()">Enviar link de acceso</button>
    <div class="magic-note">Recibirás un enlace en tu correo para ingresar sin contraseña.</div>
    <span class="toggle-link">
      <button onclick="showPassword()">Ingresar con contraseña</button>
    </span>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>window.NAV_ACTIVE_TAB = 'login';</script>
<script src="./_config.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = supabase.createClient(
  window.FOTON_CONFIG.SUPABASE_URL,
  window.FOTON_CONFIG.SUPABASE_ANON_KEY
);

// Handle OAuth redirect callback (runs on page load after Google redirects back)
db.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    location.replace('./mapa.html');
  }
});

// Also check existing session on load
db.auth.getSession().then(({ data: { session } }) => {
  if (session) location.replace('./mapa.html');
});

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Un momento...' : btn.dataset.label || btn.textContent;
}

async function loginGoogle() {
  const btn = document.getElementById('btn-google');
  btn.disabled = true;
  btn.textContent = 'Redirigiendo...';
  document.getElementById('msg').style.display = 'none';

  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/mapa',
      queryParams: { prompt: 'select_account' }
    }
  });

  if (error) {
    showMsg('No se pudo conectar con Google. Verifica la configuración.', 'error');
    btn.disabled = false;
    btn.textContent = 'Continuar con Google';
  }
}

async function loginPassword() {
  const email = document.getElementById('inp-email').value.trim();
  const password = document.getElementById('inp-password').value;
  document.getElementById('msg').style.display = 'none';

  if (!email || !password) {
    showMsg('Ingresa tu correo y contraseña.', 'error');
    return;
  }

  const btn = document.getElementById('btn-login');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    showMsg(error.message || 'Error al ingresar.', 'error');
    btn.disabled = false;
    btn.textContent = orig;
    return;
  }

  if (data.session) location.replace('./mapa.html');
}

async function loginMagic() {
  const email = document.getElementById('inp-magic-email').value.trim();
  document.getElementById('msg').style.display = 'none';

  if (!email) {
    showMsg('Ingresa tu correo electrónico.', 'error');
    return;
  }

  const btn = document.getElementById('btn-magic');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const { error } = await db.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + '/mapa' }
  });

  btn.disabled = false;
  btn.textContent = orig;

  if (error) {
    showMsg('No se pudo enviar el enlace. Intenta de nuevo.', 'error');
    return;
  }

  showMsg('¡Enlace enviado! Revisa tu correo (también la carpeta de spam).', 'success');
}

// Handle email magic link token in URL (when user clicks link from email)
const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
if (hashParams.get('access_token') || hashParams.get('type') === 'magiclink') {
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) location.replace('./mapa.html');
  });
}

function showMagicLink() {
  document.getElementById('form-password').style.display = 'none';
  document.getElementById('form-magic').style.display = 'block';
  document.getElementById('msg').style.display = 'none';
}

function showPassword() {
  document.getElementById('form-magic').style.display = 'none';
  document.getElementById('form-password').style.display = 'block';
  document.getElementById('msg').style.display = 'none';
}

// Enter key to submit
document.getElementById('inp-password')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') loginPassword();
});
document.getElementById('inp-magic-email')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') loginMagic();
});
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
