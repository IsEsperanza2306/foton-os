<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0C447C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Foton OS">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <title>Mapa de Sucursales — Foton OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --b900: #042C53; --b800: #0C447C; --b700: #185FA5; --b600: #2070BB;
      --b500: #378ADD; --b200: #B5D4F4; --b50:  #EEF5FD;
      --g900: #1A1A2E; --g700: #3C3C50; --g500: #6B6B80;
      --g300: #C4C4D0; --g100: #F0F0F5; --g50:  #F7F7FB; --white: #FFFFFF;
      --green: #1A8C5B; --green-bg: #E6F5EE;
      --amber: #B07A00; --amber-bg: #FFF8E1;
      --red: #C0392B;   --red-bg: #FDECEA;
      --new: #2563EB;   --new-bg: #EFF6FF;
      --hdr-h: 56px;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--g50); color: var(--g900); }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--hdr-h);
      background: var(--b800); display: flex; align-items: center;
      padding: 0 16px; z-index: 300; gap: 12px;
      box-shadow: 0 2px 12px rgba(4,44,83,.22);
    }
    .hdr-logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .hdr-title { font-family: 'Inter Tight', sans-serif; font-size: 15px; font-weight: 700; color: #fff; }
    .hdr-div { width: 1px; height: 22px; background: rgba(255,255,255,.2); flex-shrink: 0; }
    .hdr-sub { font-size: 10px; color: rgba(255,255,255,.5); letter-spacing: .6px; text-transform: uppercase; flex: 1; }
    .hdr-user { font-size: 11px; color: rgba(255,255,255,.6); display: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .hdr-list-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.85); font-size: 11px; font-weight: 600;
      font-family: 'Inter', sans-serif; letter-spacing: .3px;
      padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: all .15s;
      flex-shrink: 0;
    }
    .hdr-list-btn:hover { background: rgba(255,255,255,.18); }
    .hdr-list-btn svg { width: 14px; height: 14px; }
    @media (min-width: 768px) { .hdr-user { display: block; } .hdr-list-btn { display: none; } }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    #map-container {
      position: fixed;
      top: var(--hdr-h); left: 0; right: 0; bottom: 60px; /* 60px = nav bar */
    }
    #map { width: 100%; height: 100%; }

    /* ── MOBILE CARD STRIP ──────────────────────────────────── */
    #mob-strip {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 44px 10px 10px; display: flex; gap: 8px;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      background: linear-gradient(to top, rgba(247,247,251,.95) 35%, rgba(247,247,251,.5) 65%, transparent);
      z-index: 10; pointer-events: none;
    }
    #mob-strip::-webkit-scrollbar { display: none; }
    .msc {
      flex-shrink: 0; width: 160px; pointer-events: auto;
      background: var(--white); border: 1.5px solid var(--g100);
      border-radius: 10px; padding: 10px 12px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.1); transition: all .15s;
    }
    .msc:active { transform: scale(.97); }
    .msc.sel { border-color: var(--b700); box-shadow: 0 4px 16px rgba(24,95,165,.2); }
    .msc-name { font-family: 'Inter Tight', sans-serif; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .msc-loc { font-size: 10px; color: var(--g500); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msc-foot { display: flex; align-items: center; justify-content: space-between; }
    .msc-pct { font-family: 'Inter Tight', sans-serif; font-size: 18px; font-weight: 700; line-height: 1; }

    /* ── STATUS BADGE ───────────────────────────────────────── */
    .badge { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; color: #fff; }
    .b-pv  { background: #7C3D1A; }
    .b-mdt { background: #185FA5; }
    .b-hdt { background: #042C53; }
    .b-ev  { background: #1A7C4F; }

    /* ── SIDEBAR ────────────────────────────────────────────── */
    .sidebar {
      position: fixed; top: var(--hdr-h); bottom: 60px;
      left: -100%; width: 82%; max-width: 300px; z-index: 120;
      background: var(--white); border-right: 1.5px solid var(--g100);
      overflow-y: auto; transition: left .25s ease;
    }
    .sidebar.open { left: 0; }
    .sidebar-hdr {
      padding: 14px 16px 10px;
      border-bottom: 1.5px solid var(--g100);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    .sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--g500); text-transform: uppercase; }
    .filter-row {
      display: flex; gap: 5px; padding: 9px 12px;
      border-bottom: 1.5px solid var(--g100);
      overflow-x: auto; flex-wrap: nowrap;
    }
    .fb {
      font-size: 9px; font-weight: 700; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 20px; cursor: pointer;
      text-transform: uppercase; white-space: nowrap;
      border: 1.5px solid var(--g100); background: transparent;
      color: var(--g500); transition: all .15s;
    }
    .fb.fa  { border-color: var(--b200); color: var(--b700); background: var(--b50); }
    .fb.fpv { border-color: #7C3D1A; color: #7C3D1A; background: #F5EDE8; }
    .fb.fmdt{ border-color: #185FA5; color: #185FA5; background: #E6EFF8; }
    .fb.fhdt{ border-color: #042C53; color: #042C53; background: #E0E6ED; }
    .fb.fev { border-color: #1A7C4F; color: #1A7C4F; background: #E6F2EC; }
    .dist-card {
      padding: 12px 14px; border-bottom: 1px solid var(--g100);
      cursor: pointer; transition: background .15s;
      border-left: 3px solid transparent;
    }
    .dist-card:hover { background: var(--g50); }
    .dist-card.selected { background: var(--b50); border-left-color: var(--b700); }
    .dc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .dc-name { font-size: 13px; font-weight: 600; color: var(--g900); }
    .dc-loc { font-size: 10px; color: var(--g500); margin-bottom: 6px; }
    .sbar { display: flex; align-items: center; gap: 7px; }
    .sbar-track { flex: 1; height: 3px; background: var(--g100); border-radius: 2px; overflow: hidden; }
    .sbar-fill { height: 100%; border-radius: 2px; }
    .sbar-num { font-size: 11px; font-weight: 700; min-width: 32px; text-align: right; }

    /* ── DETAIL PANEL ───────────────────────────────────────── */
    .panel {
      position: fixed; left: 0; right: 0; bottom: 60px;
      height: 75vh; transform: translateY(100%);
      transition: transform .28s ease; z-index: 200;
      background: var(--white); border-top: 1.5px solid var(--g100);
      border-radius: 16px 16px 0 0;
      overflow-y: auto; pointer-events: none;
      box-shadow: 0 -8px 32px rgba(0,0,0,.1);
    }
    .panel.open { transform: translateY(0); pointer-events: auto; }
    .panel-handle {
      display: flex; justify-content: center; padding: 10px 0 4px;
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    .panel-handle::before {
      content: ''; width: 36px; height: 4px;
      background: var(--g300); border-radius: 2px;
    }
    .ph { padding: 0 16px 14px; border-bottom: 1.5px solid var(--g100); }
    .ph-name { font-family: 'Inter Tight', sans-serif; font-size: 19px; font-weight: 800; color: var(--g900); margin-bottom: 2px; }
    .ph-loc { font-size: 11px; color: var(--g500); margin-bottom: 10px; }
    .nav-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
      padding: 6px 12px; border-radius: 6px; text-decoration: none;
      border: 1.5px solid var(--g100); color: var(--g500); transition: all .15s;
    }
    .nav-btn.gmaps { border-color: #A3D9B9; color: #1A8C5B; background: #E6F5EE; }
    .nav-btn.waze  { border-color: #B5D4F4; color: var(--b700); background: var(--b50); }
    .nav-btn:hover { opacity: .8; }
    .ph-close {
      float: right; margin-left: 8px;
      background: var(--g100); border: none; color: var(--g500);
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .ph-close:hover { background: var(--g100); color: var(--g900); }
    .ps { padding: 14px 16px; border-bottom: 1.5px solid var(--g100); }
    .ps-title { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--g500); text-transform: uppercase; margin-bottom: 10px; }
    .bp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bp-lbl { font-size: 11px; color: var(--g500); width: 90px; flex-shrink: 0; }
    .bp-track { flex: 1; height: 4px; background: var(--g100); border-radius: 2px; overflow: hidden; }
    .bp-fill { height: 100%; border-radius: 2px; }
    .bp-val { font-size: 12px; font-weight: 700; min-width: 30px; text-align: right; }
    .bp-summary { margin-top: 10px; padding: 8px 12px; background: var(--g50); border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
    .bp-sum-lbl { font-size: 10px; font-weight: 600; color: var(--g500); text-transform: uppercase; letter-spacing: .5px; }
    .bp-sum-val { font-family: 'Inter Tight', sans-serif; font-size: 22px; font-weight: 800; }
    .ci { display: flex; align-items: flex-start; justify-content: space-between; padding: 8px 0; }
    .ci-body .ci-rol { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--g500); text-transform: uppercase; margin-bottom: 2px; }
    .ci-body .ci-name { font-size: 13px; font-weight: 600; color: var(--g900); }
    .ci-body .ci-tel { font-size: 11px; color: var(--b700); margin-top: 2px; font-family: monospace; }
    .ci-actions { display: flex; gap: 5px; flex-shrink: 0; margin-left: 8px; }
    .cbtn {
      width: 40px; height: 40px; border-radius: 8px; border: 1.5px solid var(--g100);
      background: none; cursor: pointer; color: var(--g500);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; transition: all .15s; font-size: 12px;
    }
    .cbtn.wa { border-color: #A3D9B9; color: var(--green); background: var(--green-bg); }
    .cbtn:hover { opacity: .75; }
    .comp-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--g100); }
    .comp-item:last-child { border-bottom: none; }
    .comp-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .comp-desc { font-size: 11px; line-height: 1.5; flex: 1; color: var(--g900); }
    .comp-meta { font-size: 10px; color: var(--g500); margin-top: 1px; }
    .comp-venc { color: var(--red); }
    .pcta { padding: 14px 16px; }
    .btn-visita {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; padding: 13px; background: var(--b700); color: #fff;
      text-decoration: none; font-family: 'Inter Tight', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      border-radius: 10px; transition: all .15s; border: none; cursor: pointer;
    }
    .btn-visita:hover { background: var(--b800); }
    .empty { padding: 10px 12px; background: var(--g50); border-radius: 8px; font-size: 11px; color: var(--g500); text-align: center; }

    /* ── OVERLAY ────────────────────────────────────────────── */
    #overlay {
      display: none; position: fixed;
      top: var(--hdr-h); inset: var(--hdr-h) 0 60px 0;
      background: rgba(0,0,0,.3); z-index: 100; backdrop-filter: blur(2px);
    }

    /* ── LEAFLET ────────────────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: var(--white); color: var(--g900);
      border: 1.5px solid var(--g100); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .leaflet-popup-tip { background: var(--white); }
    .leaflet-popup-content { margin: 10px 14px; font-family: 'Inter', sans-serif; font-size: 12px; }
    .lp-name { font-family: 'Inter Tight', sans-serif; font-size: 15px; font-weight: 800; margin-bottom: 2px; color: var(--g900); }

    /* ── DESKTOP 3-COL ──────────────────────────────────────── */
    @media (min-width: 768px) {
      #map-container { left: 290px; bottom: 60px; }
      #mob-strip { display: none; }
      .sidebar {
        position: fixed; top: var(--hdr-h); bottom: 60px;
        left: 0; width: 290px; max-width: none; transition: none;
      }
      .sidebar.open { left: 0; }
      .panel {
        position: fixed; top: var(--hdr-h); bottom: 60px; right: 0;
        width: 320px; height: auto; transform: none; border-top: none;
        border-left: 1.5px solid var(--g100); border-radius: 0;
        display: none;
      }
      .panel.open { display: block; transform: none; }
      #overlay { display: none !important; }
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--g300); border-radius: 4px; }
  </style>
</head>
<body>

<header class="header">
  <div class="hdr-logo">
    <img src="./assets/logo-icon.png" alt="Foton" style="height:52px;width:52px;object-fit:contain;flex-shrink:0;">
    <div class="hdr-title">Foton OS</div>
    <div class="hdr-div"></div>
    <div class="hdr-sub">Red de Sucursales</div>
  </div>
  <span class="hdr-user" id="hdr-user"></span>
  <button class="hdr-list-btn" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    Red
  </button>
</header>

<div id="map-container">
  <div id="map"></div>
  <div id="mob-strip"></div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-hdr">
    <span class="sidebar-title">Sucursales <span id="cnt" style="color:var(--b700);margin-left:4px">—</span></span>
  </div>
  <div class="filter-row">
    <button class="fb fa" onclick="filtrar('todos',this)">Todos</button>
    <button class="fb" onclick="filtrar('P&V',this)">P&amp;V</button>
    <button class="fb" onclick="filtrar('MDT/LDT',this)">MDT/LDT</button>
    <button class="fb" onclick="filtrar('HDT',this)">HDT</button>
    <button class="fb" onclick="filtrar('EV',this)">EV</button>
  </div>
  <div id="dist-list"></div>
</aside>

<aside class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="ph">
    <button class="ph-close" onclick="cerrar()">✕</button>
    <div class="ph-name" id="pn">—</div>
    <div class="ph-loc" id="pl">—</div>
    <div class="nav-btns">
      <a id="nav-gmaps" href="#" class="nav-btn gmaps" target="_blank" rel="noopener noreferrer" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        Google Maps
      </a>
      <a id="nav-waze" href="#" class="nav-btn waze" target="_blank" rel="noopener noreferrer" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        Waze
      </a>
    </div>
  </div>
  <div class="ps" id="panel-info">
    <div class="ps-title">Información de Sucursal</div>
    <div id="suc-info"></div>
  </div>
  <div class="pcta">
    <a href="#" class="btn-visita" id="btn-visita">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Ver en Google Maps
    </a>
  </div>
</aside>

<div id="overlay" onclick="closeAll()"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./_config.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Segmentos: mapeados desde distribuidores.segmento
const SEG = {
  'P&V':     { cls: 'b-pv',  color: '#7C3D1A', fcls: 'fpv' },
  'MDT/LDT': { cls: 'b-mdt', color: '#185FA5', fcls: 'fmdt' },
  'HDT':     { cls: 'b-hdt', color: '#042C53', fcls: 'fhdt' },
  'EV':      { cls: 'b-ev',  color: '#1A7C4F', fcls: 'fev' }
};

function segColor(seg) { return SEG[seg]?.color || '#6B6B80'; }
function segCls(seg)   { return SEG[seg]?.cls   || 'b-mdt'; }

let sucursales = [], markers = {}, selId = null, filtro = 'todos';

// CartoDB Voyager — clean light tiles matching white/blue theme
const map = L.map('map', { tap: false, zoomControl: false }).setView([21.5, -101.5], 5);
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains: 'abcd', maxZoom: 20
}).addTo(map);

function mkIcon(s) {
  const seg = s.distribuidores?.segmento || '';
  const c = segColor(seg);
  const init = (s.distribuidores?.grupo || s.distribuidores?.nombre || s.id || '')
    .replace(/[^A-Za-záéíóúÁÉÍÓÚñÑ\s]/g,'')
    .split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase() || '?';
  return L.divIcon({
    className: '',
    html: `<div style="background:${c};width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Inter Tight',sans-serif;font-weight:800;font-size:12px;color:#fff;border:3px solid #fff;box-shadow:0 2px 12px rgba(0,0,0,.2);cursor:pointer">${esc(init)}</div>`,
    iconSize: [38, 38], iconAnchor: [19, 19]
  });
}

async function load() {
  try {
    const { data, error } = await window.FOTON_DB
      .from('sucursales')
      .select('*, distribuidores(nombre, grupo, segmento)')
      .eq('activo', true)
      .order('estado');

    if (error) throw error;
    sucursales = data || [];

    // Show user email in header
    const user = window.FOTON_USER || (await window.FOTON_DB.auth.getUser()).data?.user;
    if (user) document.getElementById('hdr-user').textContent = user.email;

    renderAll();
    setTimeout(() => map.invalidateSize(), 200);
  } catch (e) {
    document.body.insertAdjacentHTML('beforeend',
      `<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:1.5px solid #F5C6C2;padding:20px 28px;border-radius:12px;font-family:'Inter',sans-serif;font-size:13px;color:#C0392B;z-index:9999;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.15)">Error al cargar sucursales<br><small style="font-size:10px;color:#6B6B80">${esc(String(e.message||e))}</small></div>`
    );
  }
}

function renderAll() {
  const vis = filtro === 'todos'
    ? sucursales
    : sucursales.filter(s => (s.distribuidores?.segmento || '') === filtro);

  document.getElementById('cnt').textContent = vis.length;

  document.getElementById('dist-list').innerHTML = vis.map(s => {
    const seg = s.distribuidores?.segmento || '';
    const grupo = s.distribuidores?.grupo || s.distribuidores?.nombre || '—';
    const ciudad = [s.ciudad, s.estado].filter(Boolean).join(', ');
    return `<div class="dist-card${selId === s.id ? ' selected' : ''}" onclick="sel('${esc(s.id)}')" id="dc${esc(s.id)}">
      <div class="dc-top"><div class="dc-name">${esc(grupo)}</div>${seg ? `<span class="badge ${segCls(seg)}">${esc(seg)}</span>` : ''}</div>
      <div class="dc-loc">${esc(ciudad)}</div>
      ${s.maps_url ? `<div style="margin-top:4px"><a href="${esc(s.maps_url)}" target="_blank" rel="noopener noreferrer" style="font-size:10px;color:var(--b700);text-decoration:none;font-weight:600" onclick="event.stopPropagation()">Ver en Maps →</a></div>` : ''}
    </div>`;
  }).join('') || '<div class="empty" style="margin:16px">Sin sucursales para este filtro</div>';

  document.getElementById('mob-strip').innerHTML = vis.map(s => {
    const seg = s.distribuidores?.segmento || '';
    const grupo = s.distribuidores?.grupo || s.distribuidores?.nombre || '—';
    const ciudad = [s.ciudad, s.estado].filter(Boolean).join(', ');
    return `<div class="msc${selId === s.id ? ' sel' : ''}" onclick="sel('${esc(s.id)}')" id="ms${esc(s.id)}">
      <div class="msc-name">${esc(grupo)}</div>
      <div class="msc-loc">${esc(ciudad)}</div>
      <div class="msc-foot">${seg ? `<span class="badge ${segCls(seg)}">${esc(seg)}</span>` : '<span></span>'}</div>
    </div>`;
  }).join('');

  Object.values(markers).forEach(m => m.remove());
  markers = {};
  vis.forEach(s => {
    if (!s.lat || !s.lng) return;
    const seg = s.distribuidores?.segmento || '';
    const grupo = s.distribuidores?.grupo || s.distribuidores?.nombre || '—';
    const ciudad = [s.ciudad, s.estado].filter(Boolean).join(', ');
    const mk = L.marker([parseFloat(s.lat), parseFloat(s.lng)], { icon: mkIcon(s) }).addTo(map);
    mk.bindPopup(`<div class="lp-name">${esc(grupo)}</div><div style="color:${segColor(seg)};font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">${esc(seg)}</div><div style="color:#6B6B80;font-size:10px">${esc(ciudad)}</div>`);
    mk.on('click', () => sel(s.id));
    markers[s.id] = mk;
  });
}

function sel(id) {
  selId = id;
  const s = sucursales.find(x => x.id === id);
  if (!s) return;

  document.querySelectorAll('.dist-card').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.msc').forEach(el => el.classList.remove('sel'));
  document.getElementById(`dc${id}`)?.classList.add('selected');
  const ms = document.getElementById(`ms${id}`);
  if (ms) { ms.classList.add('sel'); ms.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }

  const seg = s.distribuidores?.segmento || '';
  const grupo = s.distribuidores?.grupo || s.distribuidores?.nombre || '—';
  const ciudad = [s.ciudad, s.estado].filter(Boolean).join(', ');

  // Botones de navegación
  const mapsUrl = s.maps_url || (s.lat && s.lng ? `https://www.google.com/maps?q=${s.lat},${s.lng}` : null);
  const wazeUrl = s.lat && s.lng ? `https://waze.com/ul?ll=${s.lat},${s.lng}&navigate=yes` : null;

  if (mapsUrl) {
    document.getElementById('nav-gmaps').href = mapsUrl;
    document.getElementById('nav-gmaps').style.display = 'inline-flex';
  } else {
    document.getElementById('nav-gmaps').style.display = 'none';
  }
  if (wazeUrl) {
    document.getElementById('nav-waze').href = wazeUrl;
    document.getElementById('nav-waze').style.display = 'inline-flex';
  } else {
    document.getElementById('nav-waze').style.display = 'none';
  }

  document.getElementById('pn').textContent = grupo;
  document.getElementById('pl').textContent = ciudad;

  // Botón CTA principal
  const btnVisita = document.getElementById('btn-visita');
  if (mapsUrl) {
    btnVisita.href = mapsUrl;
    btnVisita.target = '_blank';
    btnVisita.rel = 'noopener noreferrer';
    btnVisita.style.display = 'flex';
  } else {
    btnVisita.style.display = 'none';
  }

  // Info de sucursal en el panel
  document.getElementById('suc-info').innerHTML = `
    <div class="ci">
      <div class="ci-body" style="width:100%">
        <div class="ci-rol">Grupo Distribuidor</div>
        <div class="ci-name">${esc(grupo)}</div>
        ${seg ? `<div style="margin-top:6px"><span class="badge ${segCls(seg)}">${esc(seg)}</span></div>` : ''}
        <div style="margin-top:8px;font-size:11px;color:var(--g500)">
          <strong style="color:var(--g700)">Ciudad:</strong> ${esc(s.ciudad || '—')}<br>
          <strong style="color:var(--g700)">Estado:</strong> ${esc(s.estado || '—')}
        </div>
        ${s.lat && s.lng ? `<div style="margin-top:6px;font-size:10px;color:var(--g500)">Coordenadas: ${s.lat}, ${s.lng}</div>` : ''}
      </div>
    </div>`;

  if (s.lat && s.lng) map.flyTo([parseFloat(s.lat), parseFloat(s.lng)], 12, { duration: .8 });
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('mob-strip').style.visibility = 'hidden';
}

function cerrar() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('mob-strip').style.visibility = 'visible';
  selId = null;
  document.querySelectorAll('.dist-card').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.msc').forEach(el => el.classList.remove('sel'));
}

function closeAll() { cerrar(); document.getElementById('sidebar').classList.remove('open'); }

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const isOpen = sb.classList.contains('open');
  sb.classList.toggle('open');
  document.getElementById('overlay').style.display = isOpen ? 'none' : 'block';
}

const FCLS = { 'todos': 'fa', 'P&V': 'fpv', 'MDT/LDT': 'fmdt', 'HDT': 'fhdt', 'EV': 'fev' };
function filtrar(cat, btn) {
  filtro = cat;
  document.querySelectorAll('.fb').forEach(b => { b.className = 'fb'; });
  if (btn) btn.classList.add(FCLS[cat] || 'fa');
  renderAll();
}

window.addEventListener('FotonAuthReady', load);
</script>
