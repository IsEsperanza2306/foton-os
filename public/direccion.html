<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Dirección — Foton México</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="_config.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-bg: #0C447C;
      --primary: #185FA5;
      --page-bg: #F7F7FB;
      --card-bg: #FFFFFF;
      --card-border: #F0F0F5;
      --text-primary: #1A1A2E;
      --text-secondary: #6B6B80;
      --green: #1A8C5B;
      --green-bg: #E6F5EE;
      --amber: #B07A00;
      --amber-bg: #FFF8E1;
      --red: #C0392B;
      --red-bg: #FDECEA;
      --login-bg: #042C53;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--page-bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* LOGIN OVERLAY */
    #login-overlay { display: none !important; }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(4,44,83,0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-logo {
      width: 120px;
      height: auto;
      margin-bottom: 20px;
      object-fit: contain;
    }

    .login-title {
      font-family: 'Inter Tight', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      text-align: center;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      text-align: center;
    }

    .login-field {
      width: 100%;
      margin-bottom: 14px;
    }

    .login-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #E0E0EC;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .login-field input:focus {
      border-color: var(--primary);
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }

    .login-btn:hover { background: #0C447C; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-error {
      margin-top: 14px;
      font-size: 13px;
      color: var(--red);
      text-align: center;
      min-height: 18px;
    }

    /* DASHBOARD */
    #dashboard { display: block; }

    .dash-header {
      background: var(--header-bg);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .dash-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .dash-header-titles { display: flex; flex-direction: column; }

    .dash-header-title {
      font-family: 'Inter Tight', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .dash-header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      font-weight: 400;
    }

    .dash-user-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }

    /* PAGE BODY */
    .dash-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .section-title {
      font-family: 'Inter Tight', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 14px;
      margin-top: 32px;
    }

    /* KPI GRID */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    @media (min-width: 600px) {
      .kpi-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .kpi-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .kpi-value {
      font-family: 'Inter Tight', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .kpi-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .kpi-card.green  { background: var(--green-bg);  border-color: #b6e5cc; }
    .kpi-card.amber  { background: var(--amber-bg);  border-color: #f5e0a0; }
    .kpi-card.red    { background: var(--red-bg);    border-color: #f5c2bb; }

    .kpi-card.green  .kpi-value { color: var(--green); }
    .kpi-card.amber  .kpi-value { color: var(--amber); }
    .kpi-card.red    .kpi-value { color: var(--red);   }

    /* DEALER GRID */
    .dealer-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 700px) {
      .dealer-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1000px) {
      .dealer-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .dealer-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dealer-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .traffic-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .traffic-dot.green { background: var(--green); }
    .traffic-dot.amber { background: #F59E0B; }
    .traffic-dot.red   { background: var(--red); }

    .dealer-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .dealer-plaza {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .progress-bar-wrap {
      background: #EEEEF5;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s;
    }

    .progress-bar-fill.green { background: var(--green); }
    .progress-bar-fill.amber { background: #F59E0B; }
    .progress-bar-fill.red   { background: var(--red); }

    .dealer-pct {
      font-family: 'Inter Tight', sans-serif;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .dealer-pct.green { color: var(--green); }
    .dealer-pct.amber { color: var(--amber); }
    .dealer-pct.red   { color: var(--red);   }

    .dealer-stats {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .dealer-stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .dealer-stat-label { color: var(--text-secondary); }
    .dealer-stat-val   { color: var(--text-primary); font-weight: 600; }

    .delta-pos { color: var(--green); font-weight: 700; }
    .delta-neg { color: var(--red);   font-weight: 700; }

    .last-visit {
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 1px solid var(--card-border);
      padding-top: 8px;
    }

    /* CHART */
    .chart-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 20px;
    }

    .chart-wrap {
      position: relative;
      height: 220px;
    }

    /* LOGOUT */
    .logout-wrap {
      text-align: center;
      margin-top: 40px;
    }

    .logout-btn {
      background: transparent;
      border: 1.5px solid #D0D0E0;
      border-radius: 8px;
      padding: 9px 24px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .loading-text {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      padding: 40px;
    }

    /* ── PRINT STYLES ───────────────────────────────────────── */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff !important; font-size: 11px !important; }
      #_foton-nav, #_foton-nav-style { display: none !important; }
      .dash-header { display: none !important; }
      #dashboard { padding: 0 !important; }
      .section-title { font-size: 10px !important; margin: 12px 0 6px !important; }
      .kpi-grid { grid-template-columns: repeat(4,1fr) !important; gap: 8px !important; break-inside: avoid; }
      .kpi-card { padding: 10px 12px !important; border: 1px solid #ddd !important; box-shadow: none !important; }
      .kpi-value { font-size: 22px !important; }
      .dealer-grid { grid-template-columns: repeat(4,1fr) !important; gap: 8px !important; }
      .dealer-card { padding: 10px !important; border: 1px solid #ddd !important; box-shadow: none !important; break-inside: avoid; }
      .chart-section { break-before: page; }
      /* Print header */
      #print-header { display: block !important; }
    }
    #print-header {
      display: none;
      padding: 16px 24px 12px;
      border-bottom: 2px solid #0C447C;
      margin-bottom: 16px;
    }
    .print-brand { font-family: 'Inter Tight', sans-serif; font-size: 18px; font-weight: 800; color: #0C447C; letter-spacing: 2px; }
    .print-title { font-size: 13px; font-weight: 600; color: #1A1A2E; margin-top: 2px; }
    .print-meta { font-size: 10px; color: #6B6B80; margin-top: 2px; }
  </style>
</head>

      await db.auth.signOut();
      errEl.textContent = 'Sin acceso a este panel.';
      return;
    }

    document.getElementById('user-badge').textContent = nombre || userEmail;
    // auth handled centrally
    loadDashboard();

  } catch (err) {
    errEl.textContent = err.message || 'Error al iniciar sesión.';
  } finally {
    btnEl.disabled = false;
    btnEl.textContent = 'Ingresar';
  }
}

// LOGOUT
async function handleLogout() {
  await db.auth.signOut();
  location.replace('./login.html');
}

// DASHBOARD LOAD
async function loadDashboard() {
  const now = new Date();
  const mesActual = now.getMonth() + 1;
  const anio = 2026;

  const [bpRes, facRes, visitasRes] = await Promise.all([
    db.from('bp_anual').select('distribuidor_id, unidades_bp').eq('anio', anio),
    db.from('facturado_ytd').select('distribuidor_id, mes, unidades_facturadas').eq('anio', anio),
    db.from('visitas').select('distribuidor_id, fecha').order('fecha', { ascending: false })
  ]);

  const bpRows  = bpRes.data  || [];
  const facRows = facRes.data || [];
  const visRows = visitasRes.data || [];

  const bpByDealer = {};
  bpRows.forEach(r => {
    bpByDealer[r.distribuidor_id] = (bpByDealer[r.distribuidor_id] || 0) + r.unidades_bp;
  });

  const facByDealer = {};
  const facByMonth  = {};
  facRows.forEach(r => {
    if (r.mes <= mesActual) {
      facByDealer[r.distribuidor_id] = (facByDealer[r.distribuidor_id] || 0) + r.unidades_facturadas;
    }
    facByMonth[r.mes] = (facByMonth[r.mes] || 0) + r.unidades_facturadas;
  });

  const lastVisit = {};
  visRows.forEach(r => {
    if (!lastVisit[r.distribuidor_id]) lastVisit[r.distribuidor_id] = r.fecha;
  });

  const bpTotal  = bpRows.length > 0 ? Object.values(bpByDealer).reduce((a,b)=>a+b, 0) : BP_TOTAL_2026;
  const facTotal = Object.values(facByDealer).reduce((a,b)=>a+b, 0);
  const avancePct = bpTotal > 0 ? Math.round(facTotal / bpTotal * 100) : 0;
  const porCerrar = Math.max(0, bpTotal - facTotal);

  renderKPIs(bpTotal, facTotal, avancePct, porCerrar, mesActual);
  renderDealers(bpByDealer, facByDealer, lastVisit, mesActual);
  renderChart(facByMonth, bpTotal);
}

// RENDER KPIs
function renderKPIs(bpTotal, facTotal, avancePct, porCerrar, mesActual) {
  let colorClass = 'red';
  if (avancePct >= 80) colorClass = 'green';
  else if (avancePct >= 50) colorClass = 'amber';

  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">BP Total 2026</div>
      <div class="kpi-value">${bpTotal}</div>
      <div class="kpi-sub">unidades objetivo</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Facturado YTD</div>
      <div class="kpi-value">${facTotal}</div>
      <div class="kpi-sub">hasta mes ${mesActual}</div>
    </div>
    <div class="kpi-card ${colorClass}">
      <div class="kpi-label">% Avance</div>
      <div class="kpi-value">${avancePct}%</div>
      <div class="kpi-sub">${avancePct >= 80 ? 'En objetivo' : avancePct >= 50 ? 'Riesgo moderado' : 'Alerta'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Por Cerrar</div>
      <div class="kpi-value">${porCerrar}</div>
      <div class="kpi-sub">unidades restantes</div>
    </div>
  `;
}

// RENDER DEALERS
function renderDealers(bpByDealer, facByDealer, lastVisit, mesActual) {
  const grid = document.getElementById('dealer-grid');
  const expectedPacePct = (mesActual / 12) * 100;
  const thresholdGreen  = expectedPacePct - 5;

  let html = '';
  Object.entries(DEALERS_META).forEach(([id, meta]) => {
    const bp       = bpByDealer[id] !== undefined ? bpByDealer[id] : meta.bp;
    const fac      = facByDealer[id] || 0;
    const pct      = bp > 0 ? Math.round(fac / bp * 100) : 0;
    const expected = Math.round((mesActual / 12) * bp);
    const delta    = fac - expected;

    let color = 'red';
    if (pct >= thresholdGreen) color = 'green';
    else if (pct >= 50)        color = 'amber';

    const barPct      = Math.min(100, pct);
    const visitaFecha = lastVisit[id] ? formatDate(lastVisit[id]) : 'Sin visitas';
    const deltaStr    = delta >= 0
      ? `<span class="delta-pos">+${delta}</span>`
      : `<span class="delta-neg">${delta}</span>`;

    html += `
      <div class="dealer-card">
        <div class="dealer-header">
          <div class="traffic-dot ${color}"></div>
          <div>
            <div class="dealer-name">${meta.nombre}</div>
            <div class="dealer-plaza">${meta.plaza}</div>
          </div>
        </div>
        <div>
          <div class="dealer-pct ${color}">${pct}%</div>
          <div class="progress-bar-wrap" style="margin-top:6px">
            <div class="progress-bar-fill ${color}" style="width:${barPct}%"></div>
          </div>
        </div>
        <div class="dealer-stats">
          <div class="dealer-stat-row">
            <span class="dealer-stat-label">BP 2026</span>
            <span class="dealer-stat-val">${bp}</span>
          </div>
          <div class="dealer-stat-row">
            <span class="dealer-stat-label">Facturado</span>
            <span class="dealer-stat-val">${fac}</span>
          </div>
          <div class="dealer-stat-row">
            <span class="dealer-stat-label">Ritmo delta</span>
            <span class="dealer-stat-val">${deltaStr}</span>
          </div>
        </div>
        <div class="last-visit">Última visita: ${visitaFecha}</div>
      </div>
    `;
  });

  grid.innerHTML = html;
}

// RENDER CHART
function renderChart(facByMonth, bpTotal) {
  const labels  = MONTHS_ES;
  const facAcum = [];
  let running   = 0;
  for (let m = 1; m <= 12; m++) {
    running += (facByMonth[m] || 0);
    facAcum.push(running);
  }

  const ritmo = MONTHS_ES.map((_, i) => Math.round(bpTotal * (i + 1) / 12));

  if (chartInstance) { chartInstance.destroy(); }

  const ctx = document.getElementById('fact-chart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Facturado acumulado',
          data: facAcum,
          borderColor: '#185FA5',
          backgroundColor: 'rgba(24,95,165,0.08)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 6,
          borderWidth: 2.5
        },
        {
          label: 'Ritmo necesario',
          data: ritmo,
          borderColor: '#B07A00',
          backgroundColor: 'transparent',
          borderDash: [6, 4],
          fill: false,
          tension: 0.1,
          pointRadius: 3,
          pointHoverRadius: 5,
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: {
            font: { family: 'Inter', size: 12 },
            color: '#6B6B80'
          }
        },
        tooltip: {
          mode: 'index',
          intersect: false
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { family: 'Inter', size: 11 }, color: '#6B6B80' }
        },
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(0,0,0,0.06)' },
          ticks: { font: { family: 'Inter', size: 11 }, color: '#6B6B80' }
        }
      }
    }
  });
}

// HELPERS
function formatDate(isoStr) {
  if (!isoStr) return '—';
  try {
    const d = new Date(isoStr);
    return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch(e) {
    return isoStr.slice(0, 10);
  }
}

    .from('usuarios')
    .select('rol, nombre')
    .eq('email', userEmail)
    .limit(1);

  if (usuarios && usuarios.length > 0) {
    document.getElementById('user-badge').textContent = usuarios[0].nombre || userEmail;
  }

  loadDashboard();
});
