<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foton México — GR Centro-Sur</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #042C53; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .hub { text-align: center; padding: 40px 24px; }
  .logo { color: white; font-size: 28px; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; }
  .sub { color: rgba(255,255,255,0.55); font-size: 13px; margin-bottom: 48px; text-transform: uppercase; letter-spacing: 1px; }
  .apps { display: flex; flex-direction: column; gap: 14px; max-width: 320px; margin: 0 auto; }
  .app-btn { background: white; border-radius: 14px; padding: 18px 24px; text-decoration: none; display: flex; align-items: center; gap: 16px; transition: transform 0.15s; }
  .app-btn:active { transform: scale(0.97); }
  .app-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .app-text .t { font-size: 15px; font-weight: 700; color: #042C53; }
  .app-text .s { font-size: 12px; color: #6B6B80; margin-top: 2px; }
  .icon-field { background: #EEF5FD; }
  .icon-bp { background: #E8F5E9; }
  .version { color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 40px; }
</style>
</head>
<body>
<div class="hub">
  <div class="logo">FOTON</div>
  <div class="sub">GR Centro-Sur · Israel Esperanza</div>
  <div class="apps">
    <a href="./field-app.html" class="app-btn">
      <div class="app-icon icon-field">📋</div>
      <div class="app-text">
        <div class="t">Field App</div>
        <div class="s">Agenda · Minuta · Guía de visita</div>
      </div>
    </a>
    <a href="./bp-tracker.html" class="app-btn">
      <div class="app-icon icon-bp">📊</div>
      <div class="app-text">
        <div class="t">BP Tracker</div>
        <div class="s">Business Plan · Facturado YTD · Avance</div>
      </div>
    </a>
  </div>
  <div class="version">v1.0 · LDR Solutions S.A. de C.V.</div>
</div>
</body>
</html>
